<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8等分圆形转盘（4蓝+3红+1黄）</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:sans-serif;
    }
    body{
        background:#f7f9fc;
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:30px;
    }
    .title{
        font-size:28px;
        font-weight:bold;
        color:#222;
    }

    .wheel-wrap{
        position:relative;
        width:360px;
        height:360px;
    }
    .wheel{
        width:100%;
        height:100%;
        border-radius:50%;
        border:6px solid #222;
        position:relative;
        box-shadow:0 0 25px rgba(0,0,0,0.2);
        background: conic-gradient(
            #42a5f5 0 180deg,
            #e53935 180deg 225deg,
            #e53935 225deg 270deg,
            #e53935 270deg 315deg,
            #ffb300 315deg 360deg
        );
    }

    .line{
        position:absolute;
        width:2px;
        height:50%;
        left:50%;
        top:0;
        background:#000;
        transform-origin:bottom center;
    }
    .line:nth-child(1){transform:rotate(0deg);}
    .line:nth-child(2){transform:rotate(180deg);}
    .line:nth-child(3){transform:rotate(225deg);}
    .line:nth-child(4){transform:rotate(270deg);}
    .line:nth-child(5){transform:rotate(315deg);}

    .pointer{
        position:absolute;
        top:-12px;
        left:50%;
        transform:translateX(-50%);
        width:40px;
        height:50px;
        z-index:10;
    }
    .pointer::before{
        content:"";
        position:absolute;
        width:0;
        height:0;
        border-left:20px solid transparent;
        border-right:20px solid transparent;
        border-top:30px solid #222;
    }

    #spinBtn{
        padding:16px 42px;
        font-size:20px;
        background:#1976d2;
        color:white;
        border:none;
        border-radius:12px;
        cursor:pointer;
    }
    #spinBtn:disabled{
        background:#999;
    }

    #result{
        font-size:26px;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="title">🎯 8等分转盘（4蓝 + 3红 + 1黄）</div>

<div class="wheel-wrap">
    <div class="wheel" id="wheel">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>
    <div class="pointer"></div>
</div>

<button id="spinBtn">开始抽奖</button>
<div id="result"></div>

<script>
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const result = document.getElementById('result');

let spinning = false;
let currentRotate = 0;

// 8等分 100%正确
const prizeList = [
    '蓝','蓝','蓝','蓝',
    '红','红','红','黄'
];

spinBtn.onclick = function(){
    if(spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    result.textContent = '转盘转动中...';

    const add = 1800 + Math.random()*360;
    currentRotate += add;
    wheel.style.transition = 'transform 4s cubic-bezier(0.2,0.8,0.2,1)';
    wheel.style.transform = `rotate(${currentRotate}deg)`;

    setTimeout(()=>{
        const angle = (360 - currentRotate%360)%360;
        const idx = Math.floor(angle/45);
        result.textContent = `抽中：${prizeList[idx]}`;
        spinning = false;
        spinBtn.disabled = false;
    }, 4000);
}
</script>
</body>
</html>
